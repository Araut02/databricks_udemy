# This is a Databricks asset bundle definition for dab_tutorial.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_tutorial
  uuid: ecb47951-ae76-49f3-9b96-4e5dcce173ae

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: dbc-b409dea7-e589.cloud.databricks.com
    variables:
      catalog: dab_tutorial
      schema: ${workspace.current_user.short_name}
    permissions:
      - group_name: admins
        level: CAN_MANAGE
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false

  prod:
    mode: production
    workspace:
      host: dbc-b409dea7-e589.cloud.databricks.com
      root_path: /Workspace/Users/amrutar291@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: dab_tutorial
      schema: prod
    permissions:
      - user_name: amrutar291@gmail.com
        level: CAN_MANAGE
